name: Deploy Blog to AWS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to S3 + Invalidate CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-logs-deploy
          aws-region: us-east-1

      - name: Fetch deploy config from Secrets Manager
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "logs/deploy-config" \
            --query SecretString \
            --output text)
          echo "S3_BUCKET_NAME=$(echo $SECRET | jq -r '.S3_BUCKET_NAME')" >> $GITHUB_ENV
          echo "CLOUDFRONT_DISTRIBUTION_ID=$(echo $SECRET | jq -r '.CLOUDFRONT_DISTRIBUTION_ID')" >> $GITHUB_ENV

      - name: Deploy HTML & JSON to S3 (no-cache)
        run: |
          aws s3 sync html/ s3://${{ env.S3_BUCKET_NAME }}/ \
            --delete \
            --exclude "*.css" \
            --exclude "*.js" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Deploy CSS & JS to S3 (long-cache)
        run: |
          aws s3 sync html/ s3://${{ env.S3_BUCKET_NAME }}/ \
            --exclude "*" \
            --include "*.css" \
            --include "*.js" \
            --cache-control "max-age=31536000,immutable"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Done
        run: echo "✅ Blog deployed to https://logs.munagalakarthik.com"
