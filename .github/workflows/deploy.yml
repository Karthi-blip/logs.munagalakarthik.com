name: Deploy Blog to AWS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build Hugo + Deploy to S3 + Invalidate CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-logs-deploy
          aws-region: us-east-1

      - name: Fetch deploy config from Secrets Manager
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "logs/deploy-config" \
            --query SecretString \
            --output text)
          echo "S3_BUCKET_NAME=$(echo $SECRET | jq -r '.S3_BUCKET_NAME')" >> $GITHUB_ENV
          echo "CLOUDFRONT_DISTRIBUTION_ID=$(echo $SECRET | jq -r '.CLOUDFRONT_DISTRIBUTION_ID')" >> $GITHUB_ENV

      - name: Deploy HTML to S3
        run: |
          aws s3 sync public/ s3://${{ env.S3_BUCKET_NAME }}/ \
            --delete \
            --exclude "*.css" \
            --exclude "*.js" \
            --exclude "*.png" \
            --exclude "*.jpg" \
            --exclude "*.webp" \
            --exclude "*.woff*" \
            --cache-control "no-cache"

      - name: Deploy static assets to S3
        run: |
          aws s3 sync public/ s3://${{ env.S3_BUCKET_NAME }}/ \
            --exclude "*" \
            --include "*.css" \
            --include "*.js" \
            --include "*.png" \
            --include "*.jpg" \
            --include "*.webp" \
            --include "*.woff*" \
            --cache-control "max-age=31536000,immutable"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Done
        run: echo "✅ Blog deployed to https://logs.munagalakarthik.com"
